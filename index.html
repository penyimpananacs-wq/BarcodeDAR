<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator ID & QR Code - Custom Background</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            gap: 40px;
            flex-wrap: wrap;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        h3 { margin-top: 0; color: #333; }
        .help-text { font-size: 13px; color: #666; margin-bottom: 10px; font-weight: normal; }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: monospace;
            resize: vertical;
        }

        button {
            background-color: #ff8c00;
            color: white;
            border: none;
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 700; 
            width: 100%;
            margin-bottom: 10px;
            font-size: 15px;
            transition: background 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        button:hover { background-color: #e07b00; }
        
        .btn-download { background-color: #28a745; }
        .btn-download:hover { background-color: #218838; }

        .btn-download-all { background-color: #007bff; margin-top: 5px; }
        .btn-download-all:hover { background-color: #0056b3; }

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }

        /* --- DESAIN KARTU DENGAN BACKGROUND --- */
        .card-container {
            width: 540px; 
            height: 960px;
            background-image: url('A1.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            box-sizing: border-box; 
        }

        .content-wrapper {
            position: absolute;
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -40%); 
            text-align: center;
            width: 80%;
        }

        .id-number { 
            font-weight: 400; /* Dibuat Reguler (Normal) */
            font-size: 24px; 
            margin-bottom: 10px; 
            color: #000; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }

        .name { 
            font-weight: 700; /* Dibuat Bold (Tebal) */
            font-size: 22px; 
            margin-bottom: 40px; 
            color: #000; 
            text-transform: uppercase; 
            line-height: 1.3;
        }
        
        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            background: white; 
            padding: 15px;
            border-radius: 10px;
            display: inline-block; 
        }

        #qrcode img { 
            width: 220px; 
            height: 220px; 
        }
        
        .preview-wrapper {
            zoom: 0.7; 
            transform-origin: top center;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h3>1. Input Data Pegawai/Santri</h3>
        <p class="help-text">Format: <b>Nomor, Nama Lengkap</b></p>
        <textarea id="dataInput" placeholder="14410236, MUHAMMAD AFDHOLUL IRODATI&#10;14410237, AHMAD SYAFIQ"></textarea>
        <button onclick="processData()">PROSES DATA</button>

        <hr style="margin: 25px 0; border: 0; border-top: 1px dashed #ccc;">

        <h3>2. Pilih & Download</h3>
        <select id="dataSelect" onchange="generateCard()"></select>
        <button class="btn-download" onclick="downloadSingle()">⬇ DOWNLOAD 1 KARTU SAJA</button>
        <button class="btn-download-all" onclick="downloadAll()">⬇ DOWNLOAD SEMUA OTOMATIS</button>
    </div>

    <div class="preview-wrapper">
        <div class="card-container" id="printArea">
            <div class="content-wrapper">
                <div class="id-number" id="idDisplay">00000000</div>
                <div class="name" id="nameDisplay">NAMA CONTOH</div>
                <div id="qrcode"></div>
            </div>
        </div>
    </div>

    <script>
        let dataMaster = [];
        let qrCodeObj = new QRCode(document.getElementById("qrcode"), {
            width: 220, height: 220, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        function processData() {
            const inputText = document.getElementById("dataInput").value;
            const lines = inputText.trim().split('\n');
            dataMaster = [];
            
            const select = document.getElementById("dataSelect");
            select.innerHTML = ''; 

            lines.forEach((line) => {
                let parts = line.split(/\t|,/); 
                if (parts.length >= 2) {
                    let idNum = parts[0].trim().toUpperCase(); 
                    let nameStr = parts[1].trim().toUpperCase(); 
                    
                    dataMaster.push({ id: idNum, nama: nameStr });

                    let option = document.createElement("option");
                    option.value = dataMaster.length - 1;
                    option.text = idNum + " - " + nameStr;
                    select.appendChild(option);
                }
            });

            if(dataMaster.length > 0) {
                alert(dataMaster.length + " data berhasil dimuat!");
                generateCard(); 
            } else {
                alert("Data kosong atau format salah. Gunakan koma untuk pemisah.");
            }
        }

        function generateCard() {
            if (dataMaster.length === 0) return;
            
            const selectedIndex = document.getElementById("dataSelect").value;
            const data = dataMaster[selectedIndex];

            document.getElementById("idDisplay").innerText = data.id;
            document.getElementById("nameDisplay").innerText = data.nama;

            qrCodeObj.clear(); 
            qrCodeObj.makeCode(data.id); 
        }

        // Fungsi Download 1 Kartu
        function downloadSingle() {
            return new Promise((resolve) => {
                const card = document.getElementById("printArea");
                const fileName = document.getElementById("idDisplay").innerText + ".png";

                html2canvas(card, { scale: 2, useCORS: true }).then(canvas => {
                    let link = document.createElement('a');
                    link.download = fileName;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    resolve(); // Memberi sinyal bahwa download selesai
                });
            });
        }

        // Fungsi Download Semua Data
        async function downloadAll() {
            if (dataMaster.length === 0) {
                alert("Proses dulu datanya sebelum mendownload!");
                return;
            }

            const konfirmasi = confirm(`Anda akan mendownload ${dataMaster.length} file gambar secara otomatis.\n\nBrowser mungkin akan meminta izin "Allow downloading multiple files". Izinkan jika muncul pop-up.\n\nLanjutkan?`);
            
            if (!konfirmasi) return;

            const select = document.getElementById("dataSelect");

            for (let i = 0; i < dataMaster.length; i++) {
                // Ubah pilihan dropdown ke index ke-i
                select.value = i;
                generateCard(); // Perbarui tampilan teks dan QR code

                // Tunggu 0.5 detik agar QR Code selesai di-render sebelum difoto
                await new Promise(r => setTimeout(r, 500));

                // Eksekusi download gambar
                await downloadSingle();

                // Tunggu 0.5 detik sebelum lanjut ke data berikutnya agar browser tidak crash
                await new Promise(r => setTimeout(r, 500));
            }

            alert("Proses download semua kartu selesai!");
        }
    </script>

</body>
</html>
