<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator ID & QR Code - Fixed Layout</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* --- PANEL KONTROL --- */
        .panel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        h3 { margin-top: 0; color: #333; }
        .help-text { font-size: 13px; color: #666; margin-bottom: 10px; font-weight: normal; }

        textarea {
            width: 100%; height: 180px; padding: 12px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; font-family: monospace;
        }

        button {
            border: none; padding: 12px 15px; cursor: pointer; border-radius: 8px;
            font-weight: 700; width: 100%; margin-bottom: 10px; font-size: 15px;
            font-family: 'Montserrat', sans-serif; color: white;
        }
        
        .btn-process { background-color: #ff8c00; }
        .btn-process:hover { background-color: #e07b00; }
        .btn-download { background-color: #28a745; }
        .btn-download:hover { background-color: #218838; }
        .btn-download-all { background-color: #007bff; margin-top: 5px; }
        .btn-download-all:hover { background-color: #0056b3; }

        select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-weight: 700; }

        /* --- DESAIN KARTU (BEBAS BUG) --- */
        .preview-wrapper {
            /* Transform ini aman, tidak merusak html2canvas */
            transform: scale(0.7); 
            transform-origin: top center;
            margin-bottom: -280px; 
        }

        .card-container {
            width: 540px; 
            height: 960px;
            background-image: url('A1.jpg'); 
            background-size: 540px 960px;
            background-position: top center;
            background-repeat: no-repeat;
            background-color: white; /* Mencegah bug transparan */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            
            /* Layout baru tanpa absolute positioning */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            
            /* PENTING: Atur jarak dari atas layar ke tulisan Nomor di sini */
            padding-top: 410px; 
            box-sizing: border-box; 
        }

        .id-number { 
            font-weight: 400; font-size: 24px; margin-bottom: 5px; 
            color: #000; letter-spacing: 2px; text-transform: uppercase; 
            text-align: center;
        }

        .name { 
            font-weight: 700; font-size: 22px; margin-bottom: 35px; 
            color: #000; text-transform: uppercase; line-height: 1.3; 
            text-align: center; width: 80%;
        }
        
        #qrcode-container {
            background: white; 
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 220px; 
            height: 220px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* Sedikit bayangan agar tidak flat */
        }

        /* Memaksa QR Code tetap pada ukurannya */
        #qrcode img, #qrcode canvas { 
            width: 190px !important; 
            height: 190px !important; 
        }
    </style>
</head>
<body>

    <div class="panel">
        <h3>1. Input Data Pegawai/Santri</h3>
        <p class="help-text">Format: <b>Nomor, Nama Lengkap</b></p>
        <textarea id="dataInput" placeholder="14380912, ACHMAD OFFAL&#10;14440205, AHMAD JASULI"></textarea>
        <button class="btn-process" onclick="processData()">PROSES DATA</button>

        <hr style="margin: 25px 0; border: 0; border-top: 1px dashed #ccc;">

        <h3>2. Pilih & Download</h3>
        <select id="dataSelect" onchange="generateCard()"></select>
        <button class="btn-download" onclick="downloadSingle()">⬇ DOWNLOAD 1 KARTU</button>
        <button class="btn-download-all" onclick="downloadAll()">⬇ DOWNLOAD SEMUA OTOMATIS</button>
    </div>

    <div class="preview-wrapper">
        <div class="card-container" id="printArea">
            <div class="id-number" id="idDisplay">00000000</div>
            <div class="name" id="nameDisplay">NAMA CONTOH</div>
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>
        </div>
    </div>

    <script>
        let dataMaster = [];
        let qrCodeObj = new QRCode(document.getElementById("qrcode"), {
            width: 190, height: 190, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        function processData() {
            const inputText = document.getElementById("dataInput").value;
            const lines = inputText.trim().split('\n');
            dataMaster = [];
            const select = document.getElementById("dataSelect");
            select.innerHTML = ''; 

            lines.forEach((line) => {
                let parts = line.split(/\t|,/); 
                if (parts.length >= 2) {
                    let idNum = parts[0].trim().toUpperCase(); 
                    let nameStr = parts[1].trim().toUpperCase(); 
                    dataMaster.push({ id: idNum, nama: nameStr });

                    let option = document.createElement("option");
                    option.value = dataMaster.length - 1;
                    option.text = idNum + " - " + nameStr;
                    select.appendChild(option);
                }
            });

            if(dataMaster.length > 0) {
                alert(dataMaster.length + " data berhasil dimuat!");
                generateCard(); 
            }
        }

        function generateCard() {
            if (dataMaster.length === 0) return;
            const data = dataMaster[document.getElementById("dataSelect").value];
            document.getElementById("idDisplay").innerText = data.id;
            document.getElementById("nameDisplay").innerText = data.nama;
            qrCodeObj.clear(); 
            qrCodeObj.makeCode(data.id); 
        }

        function downloadSingle() {
            return new Promise((resolve) => {
                const card = document.getElementById("printArea");
                const fileName = document.getElementById("idDisplay").innerText + ".png";

                // Konfigurasi html2canvas yang lebih kaku agar tidak berantakan
                html2canvas(card, { 
                    scale: 2, 
                    useCORS: true,
                    width: 540,
                    height: 960,
                    backgroundColor: "#ffffff"
                }).then(canvas => {
                    let link = document.createElement('a');
                    link.download = fileName;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    resolve(); 
                });
            });
        }

        async function downloadAll() {
            if (dataMaster.length === 0) {
                alert("Proses dulu datanya sebelum mendownload!");
                return;
            }

            const konfirmasi = confirm(`Download ${dataMaster.length} gambar otomatis? Izinkan popup browser jika muncul.`);
            if (!konfirmasi) return;

            const select = document.getElementById("dataSelect");

            for (let i = 0; i < dataMaster.length; i++) {
                select.value = i;
                generateCard(); 
                
                // Beri waktu 0.5 detik agar QR Code benar-benar tercetak sebelum difoto
                await new Promise(r => setTimeout(r, 500));
                await downloadSingle();
                await new Promise(r => setTimeout(r, 500));
            }
            alert("Proses download selesai!");
        }
    </script>

</body>
</html>
